<!DOCTYPE html>
<!--
  S4 spike — static MediaRecorder narration recorder.

  Goal (CONTRACTS §17, §15 NarrationRecorder): prove that an in-browser
  MediaRecorder capture (audio/webm;codecs=opus) records, plays back, and
  uploads to POST /api/items/{id}/narration/{slot} over HTTPS/tunnel.

  This is a throwaway page (no build step). It is served as a plain static file
  and talks to the backend on the same origin, so it works behind the Cloudflare
  tunnel. getUserMedia requires a secure context (HTTPS or localhost) — the
  tunnel provides HTTPS in production.

  UI strings: Hungarian. Code identifiers and comments: English.
-->
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>S4 — Narráció felvétel (spike)</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 640px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5;
    }
    h1 { font-size: 1.25rem; }
    fieldset { border: 1px solid #8884; border-radius: 8px; margin: 1rem 0; }
    label { display: block; margin: 0.5rem 0 0.25rem; font-weight: 600; }
    input, select { font: inherit; padding: 0.4rem; width: 100%; box-sizing: border-box; }
    .row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    button {
      font: inherit; padding: 0.5rem 1rem; border-radius: 8px;
      border: 1px solid #8886; cursor: pointer; background: #4f8cff22;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.rec { background: #ff4f4f33; }
    audio { width: 100%; margin-top: 0.75rem; }
    #status { margin-top: 1rem; padding: 0.6rem 0.8rem; border-radius: 8px; background: #8881; white-space: pre-wrap; }
    #status.ok { background: #2ecc7133; }
    #status.err { background: #ff4f4f33; }
    .dot { display: inline-block; width: 0.7rem; height: 0.7rem; border-radius: 50%; background: #e02; margin-right: 0.4rem; animation: blink 1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }
    small { opacity: 0.7; }
  </style>
</head>
<body>
  <h1>Narráció felvétel (S4 spike)</h1>
  <p><small>
    MediaRecorder felvétel + feltöltés a backendre. A mikrofon HTTPS-t igényel —
    a Cloudflare tunnel ezt biztosítja (helyben a <code>localhost</code> is jó).
  </small></p>

  <fieldset>
    <legend>Cél</legend>
    <label for="apiBase">API alap (üres = azonos origin)</label>
    <input id="apiBase" type="text" placeholder="pl. https://gyar.pelda.hu" />

    <label for="itemId">Elem azonosító (item id)</label>
    <input id="itemId" type="number" min="1" step="1" placeholder="pl. 1" />

    <label for="slot">Sáv (slot)</label>
    <select id="slot">
      <option value="a" selected>a — körülírás (sziluett alatt)</option>
      <option value="b">b — megnevezés (reveal után)</option>
    </select>
  </fieldset>

  <fieldset>
    <legend>Felvétel</legend>
    <div class="row">
      <button id="recBtn" type="button">● Felvétel</button>
      <button id="stopBtn" type="button" disabled>■ Stop</button>
      <span id="recIndicator" hidden><span class="dot"></span>Felvétel folyamatban…</span>
    </div>
    <audio id="preview" controls hidden></audio>
  </fieldset>

  <fieldset>
    <legend>Feltöltés</legend>
    <div class="row">
      <button id="uploadBtn" type="button" disabled>⇪ Feltöltés</button>
      <button id="resetBtn" type="button" disabled>↺ Újra</button>
    </div>
  </fieldset>

  <div id="status">Készen áll. Add meg az elem azonosítóját, majd indítsd a felvételt.</div>

  <script>
    "use strict";

    // --- Constants -----------------------------------------------------------
    // Opus-in-WebM matches the NarrationRecorder contract (CONTRACTS §15) and is
    // what the backend audio pipeline (clean_narration) expects as raw input.
    const PREFERRED_MIME = "audio/webm;codecs=opus";
    // Multipart field name the items API reads the upload from. Centralised here
    // so it is trivial to align with the backend handler if it differs.
    const UPLOAD_FIELD = "file";

    // --- State ---------------------------------------------------------------
    let mediaRecorder = null;
    let mediaStream = null;
    let chunks = [];
    let recordedBlob = null;
    let recordedMime = "";

    // --- Elements ------------------------------------------------------------
    const $ = (id) => document.getElementById(id);
    const els = {
      apiBase: $("apiBase"), itemId: $("itemId"), slot: $("slot"),
      recBtn: $("recBtn"), stopBtn: $("stopBtn"), uploadBtn: $("uploadBtn"),
      resetBtn: $("resetBtn"), preview: $("preview"), status: $("status"),
      recIndicator: $("recIndicator"),
    };

    // --- Helpers -------------------------------------------------------------
    function setStatus(text, kind) {
      els.status.textContent = text;
      els.status.className = kind || "";
    }

    function pickSupportedMime() {
      const candidates = [PREFERRED_MIME, "audio/webm", "audio/ogg;codecs=opus", "audio/mp4"];
      if (typeof MediaRecorder === "undefined" || !MediaRecorder.isTypeSupported) {
        return ""; // let the browser choose its default container
      }
      for (const m of candidates) {
        if (MediaRecorder.isTypeSupported(m)) return m;
      }
      return "";
    }

    // Map a recorded MIME type to a sensible upload filename extension.
    function filenameForMime(mime) {
      if (mime.includes("webm")) return "narration.webm";
      if (mime.includes("ogg")) return "narration.ogg";
      if (mime.includes("mp4") || mime.includes("m4a")) return "narration.m4a";
      if (mime.includes("wav")) return "narration.wav";
      return "narration.bin";
    }

    function buildUrl() {
      const base = els.apiBase.value.trim().replace(/\/+$/, "");
      const id = els.itemId.value.trim();
      const slot = els.slot.value;
      return `${base}/api/items/${encodeURIComponent(id)}/narration/${slot}`;
    }

    function releaseStream() {
      if (mediaStream) {
        mediaStream.getTracks().forEach((t) => t.stop());
        mediaStream = null;
      }
    }

    // --- Recording -----------------------------------------------------------
    async function startRecording() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("A böngésző nem támogatja a mikrofon-hozzáférést (getUserMedia).", "err");
        return;
      }
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 },
        });
      } catch (err) {
        setStatus("Nem sikerült elérni a mikrofont: " + err.message +
          "\n(HTTPS szükséges — a tunnelen vagy localhoston próbáld.)", "err");
        return;
      }

      const mime = pickSupportedMime();
      chunks = [];
      recordedBlob = null;
      try {
        mediaRecorder = mime ? new MediaRecorder(mediaStream, { mimeType: mime })
                             : new MediaRecorder(mediaStream);
      } catch (err) {
        setStatus("MediaRecorder hiba: " + err.message, "err");
        releaseStream();
        return;
      }
      recordedMime = mediaRecorder.mimeType || mime || "audio/webm";

      mediaRecorder.addEventListener("dataavailable", (e) => {
        if (e.data && e.data.size > 0) chunks.push(e.data);
      });
      mediaRecorder.addEventListener("stop", onRecordingStopped);

      mediaRecorder.start();
      els.recBtn.disabled = true;
      els.recBtn.classList.add("rec");
      els.stopBtn.disabled = false;
      els.uploadBtn.disabled = true;
      els.resetBtn.disabled = true;
      els.recIndicator.hidden = false;
      els.preview.hidden = true;
      setStatus("Felvétel folyamatban… Beszélj, majd nyomd meg a Stop gombot.");
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
    }

    function onRecordingStopped() {
      releaseStream();
      recordedBlob = new Blob(chunks, { type: recordedMime });
      const url = URL.createObjectURL(recordedBlob);
      els.preview.src = url;
      els.preview.hidden = false;

      els.recBtn.disabled = false;
      els.recBtn.classList.remove("rec");
      els.stopBtn.disabled = true;
      els.uploadBtn.disabled = false;
      els.resetBtn.disabled = false;
      els.recIndicator.hidden = true;

      const kb = (recordedBlob.size / 1024).toFixed(1);
      setStatus(`Felvétel kész (${kb} kB, ${recordedMime}). Visszahallgathatod, majd feltöltheted.`, "ok");
    }

    function resetRecording() {
      recordedBlob = null;
      chunks = [];
      if (els.preview.src) {
        URL.revokeObjectURL(els.preview.src);
        els.preview.removeAttribute("src");
      }
      els.preview.hidden = true;
      els.uploadBtn.disabled = true;
      els.resetBtn.disabled = true;
      setStatus("Törölve. Indíthatsz új felvételt.");
    }

    // --- Upload --------------------------------------------------------------
    async function uploadRecording() {
      if (!recordedBlob) {
        setStatus("Nincs felvétel a feltöltéshez.", "err");
        return;
      }
      const id = els.itemId.value.trim();
      if (!id) {
        setStatus("Add meg az elem azonosítóját (item id) a feltöltés előtt.", "err");
        return;
      }

      const form = new FormData();
      form.append(UPLOAD_FIELD, recordedBlob, filenameForMime(recordedMime));

      els.uploadBtn.disabled = true;
      setStatus("Feltöltés folyamatban…");
      try {
        const resp = await fetch(buildUrl(), { method: "POST", body: form });
        const text = await resp.text();
        if (!resp.ok) {
          setStatus(`Feltöltés sikertelen (HTTP ${resp.status}).\n${text}`, "err");
          els.uploadBtn.disabled = false;
          return;
        }
        let pretty = text;
        try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch (_) { /* not JSON */ }
        setStatus("Feltöltés kész. A backend válasza (Item):\n" + pretty, "ok");
      } catch (err) {
        setStatus("Hálózati hiba a feltöltéskor: " + err.message, "err");
        els.uploadBtn.disabled = false;
      }
    }

    // --- Wiring --------------------------------------------------------------
    els.recBtn.addEventListener("click", startRecording);
    els.stopBtn.addEventListener("click", stopRecording);
    els.uploadBtn.addEventListener("click", uploadRecording);
    els.resetBtn.addEventListener("click", resetRecording);

    // Default the API base to the current origin so it works behind the tunnel.
    if (location.protocol.startsWith("http")) {
      els.apiBase.placeholder = location.origin;
    }
  </script>
</body>
</html>
