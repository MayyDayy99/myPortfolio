# „Már ezt is tudom" videógyár — lásd docs/01-BLUEPRINT.md
# FONTOS: a ComfyUI NEM ide tartozik — natívan fut a Macen (ADR-2).
services:
  app:
    build: ./backend
    env_file: .env
    environment:
      - COMFYUI_URL=${COMFYUI_URL:-http://host.docker.internal:8188}
      - DATA_DIR=/data
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8000:8000"   # csak localhost (debug); kifelé a tunnel visz
    restart: unless-stopped
    # Linux hoston kellene még:
    # extra_hosts: ["host.docker.internal:host-gateway"]

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
